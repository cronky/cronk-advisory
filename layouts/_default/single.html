{{ define "main" }}
<section class="section section-cream" style="min-height:60vh;">
  <div class="section-inner" style="max-width:720px;">
    <div style="padding-top:24px;margin-bottom:20px;">
      <a href="/" style="font-family:var(--heading);font-size:13px;font-weight:600;color:var(--ink-lt);">← Back to home</a>
    </div>
    <article class="prose">{{ .Content }}</article>
  </div>
</section>
<style>
.prose h1 { font-size:clamp(26px,4vw,38px); margin-bottom:8px; }
.prose h2 { font-size:20px; margin-top:40px; margin-bottom:12px; }
.prose p  { color:var(--ink-m); margin-bottom:16px; }
.prose a  { color:var(--forest); }
.prose ul { color:var(--ink-m); padding-left:20px; margin-bottom:16px; }
.prose li { margin-bottom:6px; }
</style>
{{ end }}
